<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 560" fill="none">
  <!-- Al-Mousawi Clinics Logo - Gold version -->

  <!-- Top M-shape: flowing tooth crown with two cusps (calligraphic brushstroke) -->
  <path d="M 115 278
           C 103 205 118 148 165 122
           C 202 102 235 140 258 168
           C 278 142 318 105 368 126
           C 425 150 440 212 418 278"
    stroke="#D4AF37" stroke-width="26" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- First horizontal sweep line (gum line) -->
  <path d="M 80 313 C 182 296 335 296 448 313"
    stroke="#D4AF37" stroke-width="18" stroke-linecap="round" fill="none"/>

  <!-- Second horizontal sweep line (slightly lower, thinner) -->
  <path d="M 72 356 C 178 338 322 338 438 356"
    stroke="#D4AF37" stroke-width="12" stroke-linecap="round" fill="none"/>

  <!-- Large C-curve / root shape -->
  <path d="M 100 392
           C 55 448 58 506 108 528
           C 168 554 252 540 295 507
           C 322 488 328 462 312 440"
    stroke="#D4AF37" stroke-width="26" stroke-linecap="round" fill="none"/>
</svg>
