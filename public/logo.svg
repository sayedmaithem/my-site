<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200" fill="none">
  <!-- Professional dental clinic logo -->

  <!-- Outer circle -->
  <circle cx="100" cy="100" r="95" stroke="#D4AF37" stroke-width="2" fill="none" opacity="0.3"/>

  <!-- Main tooth shape -->
  <path d="M 100 25 C 115 25 125 35 125 55 L 125 90 C 125 105 115 115 100 120 C 85 115 75 105 75 90 L 75 55 C 75 35 85 25 100 25 Z" fill="#D4AF37" stroke="#D4AF37" stroke-width="1.5"/>

  <!-- Shine/highlight on tooth -->
  <path d="M 85 50 Q 95 45 105 50" fill="none" stroke="rgba(255,255,255,0.6)" stroke-width="2" stroke-linecap="round"/>

  <!-- Root accent -->
  <line x1="95" y1="120" x2="95" y2="135" stroke="#D4AF37" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
  <line x1="100" y1="120" x2="100" y2="138" stroke="#D4AF37" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="105" y1="120" x2="105" y2="135" stroke="#D4AF37" stroke-width="2" stroke-linecap="round" opacity="0.7"/>

  <!-- Bottom glow -->
  <ellipse cx="100" cy="125" rx="22" ry="6" fill="#D4AF37" opacity="0.15"/>
</svg>
