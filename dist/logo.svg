<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 113" fill="none">
  <!--
    Al-Mousawi Clinics — exact logo trace (white version for dark backgrounds)
    4 elements: M-crown, line 1, line 2, C-curve
  -->

  <!-- ① M-crown: left hump (bigger/rounder) → right hump (smaller) → sweeping tail with hook -->
  <path d="
    M 14 50
    C 13 36 17 21 28 14
    C 38  9 47 22 50 30
    C 53 21 63 11 73 15
    C 84 20 87 35 84 51
    C 83 55 80 57 76 55
  "
    stroke="white" stroke-width="5.8" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- ② First (thicker) horizontal sweep line -->
  <path d="M 10 59 C 32 55 65 55 88 61"
    stroke="white" stroke-width="4.0" stroke-linecap="round" fill="none"/>

  <!-- ③ Second (thinner) horizontal sweep line -->
  <path d="M  8 68 C 30 64 63 64 85 69"
    stroke="white" stroke-width="2.4" stroke-linecap="round" fill="none"/>

  <!-- ④ C-curve: sweeps from upper-left, around bottom, to right with small S-curl -->
  <path d="
    M 13 76
    C  2 87  1 101 13 106
    C 25 111 46 108 60 100
    C 69 94  70 84  62  79
    C 60 77  62 75  65  76
  "
    stroke="white" stroke-width="5.8" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
</svg>
